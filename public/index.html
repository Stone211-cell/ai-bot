<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord AI Bot - Control Dashboard</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="glass-panel login-box">
            <h2><i class="fa-solid fa-robot"></i> Bot Dashboard</h2>
            <p>กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
            <input type="password" id="password-input" placeholder="Password...">
            <button id="login-btn">เข้าสู่ระบบ</button>
            <p id="login-error" class="error-text hidden">รหัสผ่านไม่ถูกต้อง</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="hidden dashboard-grid">
        <!-- Left Sidebar (Navigation & Voice) -->
        <aside class="sidebar glass-panel left-sidebar">
            <div class="logo">
                <i class="fa-solid fa-robot"></i> Villain Dashboard
            </div>
            
            <div class="selector-group mt-3">
                <label>เซิร์ฟเวอร์ (Guild)</label>
                <select id="guild-selector">
                    <option value="">-- กำลังโหลด --</option>
                </select>
            </div>
            
            <div class="selector-group">
                <label>ห้องแชท (Text Channel)</label>
                <select id="channel-selector" disabled>
                    <option value="">-- เลือกห้องแชท --</option>
                </select>
            </div>

            <hr class="divider">

            <div class="voice-controls mt-2">
                <h3><i class="fa-solid fa-microphone-lines"></i> ระบบเสียง</h3>
                <div class="selector-group">
                    <select id="voice-channel-selector" disabled>
                        <option value="">-- เลือกห้องเสียง --</option>
                    </select>
                </div>
                <div class="voice-buttons mt-2">
                    <button id="join-voice-btn" class="btn btn-outline" disabled>เชื่อมต่อ</button>
                    <button id="leave-voice-btn" class="btn btn-danger hidden">ตัดการเชื่อมต่อ</button>
                </div>

                <!-- TTS Section (Visible only when joined) -->
                <div id="voice-actions" class="hidden mt-3 pt-3" style="border-top: 1px solid rgba(255,255,255,0.08);">
                    <label class="section-label text-accent"><i class="fa-solid fa-comment-dots"></i> ให้ AI พูดสดๆ (TTS)</label>
                    <div class="input-with-btn">
                        <input type="text" id="tts-input" placeholder="พิมพ์ประโยคให้ AI พูด...">
                        <button id="tts-send-btn" class="btn btn-primary" title="ส่งเสียงพูด"><i class="fa-solid fa-play"></i></button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Middle (Main Chat Area) -->
        <main class="chat-area glass-panel">
            <div class="chat-header">
                <h3 id="current-channel-name" class="channel-title"># เลือกห้องแชท</h3>
                <div class="voice-status" id="voice-status-indicator">
                    <span class="status-dot"></span> <span id="voice-status-text">ออฟไลน์เสียง</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="empty-state">
                    <i class="fa-regular fa-comments"></i>
                    <p>เลือกห้องแชทเพื่อดูข้อความ</p>
                </div>
            </div>
            
            <!-- Context Bars -->
            <div id="replying-to-bar" class="hidden context-bar">
                <span class="text-truncate">Replying to: <span id="reply-to-text"></span></span>
                <button id="cancel-reply-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="attachment-preview-bar" class="hidden context-bar">
                <span class="text-truncate"><i class="fa-solid fa-file"></i> <span id="attachment-name"></span></span>
                <button id="cancel-attachment-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="audio-preview-bar" class="hidden context-bar audio-bar">
                <audio id="audio-player" controls></audio>
                <div class="audio-controls">
                    <button id="send-audio-msg-btn" class="btn btn-primary btn-sm">ส่งเสียง</button>
                    <button id="cancel-audio-btn" class="btn btn-danger btn-sm">ยกเลิก</button>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input type="file" id="file-input" class="hidden" accept="image/*,video/*,audio/*">
                
                <div class="input-tools">
                    <button id="attach-btn" class="btn-icon" title="แนบไฟล์"><i class="fa-solid fa-paperclip"></i></button>
                    <button id="record-chat-btn" class="btn-icon danger-icon" title="อัดเสียง"><i class="fa-solid fa-microphone"></i></button>
                </div>
                
                <select id="mention-selector" class="btn-icon" style="width: auto; padding: 0 10px; margin-bottom: 0; background: rgba(0,0,0,0.3); border-radius: 8px;">
                    <option value="">@ แท็ก</option>
                </select>

                <textarea id="message-input" placeholder="ส่งข้อความ... (Shift+Enter เพื่อส่ง)" disabled rows="1"></textarea>
                
                <button id="send-btn" class="btn-icon primary" disabled><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <!-- Right Sidebar (Troll System) -->
        <aside class="sidebar glass-panel right-sidebar">
            <h3 class="text-accent mb-3"><i class="fa-solid fa-skull"></i> ระบบก่อกวน</h3>
            
            <div class="glass-card mb-3">
                <div class="toggle-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label class="text-secondary" style="margin: 0; font-weight: 500;"><i class="fa-solid fa-mask"></i> โหมดปลอมตัว (ปิด AI)</label>
                    <label class="switch">
                        <input type="checkbox" id="disguise-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="text-danger" style="margin: 0; font-weight: 500;"><i class="fa-solid fa-ghost"></i> โหมดเสียงตัวร้าย</label>
                    <label class="switch">
                        <input type="checkbox" id="villain-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-group" style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                    <label class="text-primary" style="margin: 0; font-weight: 500;"><i class="fa-solid fa-microphone-lines"></i> โหมดเครื่องแปลงเสียง</label>
                    <label class="switch">
                        <input type="checkbox" id="echo-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="selector-group">
                <label>เตะผู้ใช้ (Kick)</label>
                <div class="input-with-btn">
                    <select id="kick-selector" disabled>
                        <option value="">-- เลือกเหยื่อ --</option>
                    </select>
                    <button id="kick-btn" class="btn btn-danger" style="width: auto; padding: 0 15px;" title="เตะออก"><i class="fa-solid fa-boot"></i> เตะ</button>
                </div>
            </div>

            <hr class="divider">

            <div class="troll-controls mt-2">
                <button id="delete-channel-btn" class="btn btn-danger mb-2"><i class="fa-solid fa-trash"></i> ลบห้องแชทนี้</button>
                <button id="spam-btn" class="btn btn-outline mb-2"><i class="fa-solid fa-bomb"></i> สแปมข้อความ</button>
                
                <div class="takeover-box glass-card mt-3">
                    <label class="section-label text-danger"><i class="fa-solid fa-biohazard"></i> ประกาศยึดครองโลก</label>
                    <textarea id="takeover-msg-input" placeholder="พิมพ์ข้อความประกาศ..." rows="2" class="w-100" style="background: rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 8px; margin-bottom: 10px;"></textarea>
                    <button id="takeover-btn" class="btn btn-danger w-100"><i class="fa-solid fa-bullhorn"></i> ส่งประกาศทุกห้อง</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
